<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 400" width="1280" height="400" role="img" aria-label="Aasif Rashid Dar — Software Engineer">
<title>Aasif Rashid Dar — Software Engineer at Cogveel Technologies</title>
<defs>
<style type="text/css"><![CDATA[
text{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{0%{opacity:0;transform:translateY(12px) scale(.75)}70%{opacity:1;transform:translateY(-2px) scale(1.04)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.3)}50%{opacity:1;transform:scale(1)}}
@keyframes rise{0%{transform:translateY(0);opacity:0}12%{opacity:.5}88%{opacity:.5}100%{transform:translateY(-40px);opacity:0}}
@keyframes neonPulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes scanH{0%{transform:translateX(-200px)}100%{transform:translateX(1480px)}}
@keyframes scanV{0%{transform:translateY(-50px)}100%{transform:translateY(450px)}}
@keyframes gradShift{0%{stop-color:#B14EE0}33%{stop-color:#6E40C9}66%{stop-color:#FF2D9B}100%{stop-color:#B14EE0}}
@keyframes gradShift2{0%{stop-color:#FF2D9B}33%{stop-color:#B14EE0}66%{stop-color:#6E40C9}100%{stop-color:#FF2D9B}}
.ltr{opacity:0;animation:popIn .45s cubic-bezier(.2,.8,.3,1.3) forwards;transform-box:fill-box;transform-origin:center bottom}
.tw{transform-box:fill-box;transform-origin:center;animation:twinkle 2.8s ease-in-out infinite}
.fl{animation:floaty 4.5s ease-in-out infinite}
.np{animation:neonPulse 2.5s ease-in-out infinite}
.rp{animation:rise linear infinite}
.pill{opacity:0;transform-box:fill-box;transform-origin:center;cursor:pointer;transition:transform .18s,filter .18s}
.pill:hover{transform:scale(1.09);filter:brightness(1.4)}
.cur{animation:blink 1s step-end infinite}
]]></style>

<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#0D1117"/><stop offset="50%" stop-color="#12082A"/><stop offset="100%" stop-color="#0A0612"/>
</linearGradient>
<linearGradient id="nameg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%"><animate attributeName="stop-color" values="#B14EE0;#6E40C9;#FF2D9B;#B14EE0" dur="6s" repeatCount="indefinite"/></stop>
  <stop offset="50%"><animate attributeName="stop-color" values="#FF2D9B;#B14EE0;#6E40C9;#FF2D9B" dur="6s" repeatCount="indefinite"/></stop>
  <stop offset="100%"><animate attributeName="stop-color" values="#6E40C9;#FF2D9B;#B14EE0;#6E40C9" dur="6s" repeatCount="indefinite"/></stop>
</linearGradient>
<linearGradient id="borderg" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#B14EE0" stop-opacity=".4"/>
  <stop offset="50%" stop-color="#6E40C9" stop-opacity=".35"/>
  <stop offset="100%" stop-color="#FF2D9B" stop-opacity=".4"/>
</linearGradient>
<radialGradient id="orbP"><stop offset="0%" stop-color="#B14EE0" stop-opacity=".12"/><stop offset="100%" stop-color="#B14EE0" stop-opacity="0"/></radialGradient>
<radialGradient id="orbB"><stop offset="0%" stop-color="#6E40C9" stop-opacity=".14"/><stop offset="100%" stop-color="#6E40C9" stop-opacity="0"/></radialGradient>
<radialGradient id="orbPink"><stop offset="0%" stop-color="#FF2D9B" stop-opacity=".10"/><stop offset="100%" stop-color="#FF2D9B" stop-opacity="0"/></radialGradient>
<filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="glowBig"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r=".55" fill="rgba(177,78,224,.12)"/></pattern>
<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(110,64,201,.08)" stroke-width="0.5"/></pattern>
<clipPath id="bannerBox"><rect x="1" y="1" width="1278" height="398" rx="18"/></clipPath>
<clipPath id="cPrompt"><rect x="48" y="30" width="0" height="28"><animate attributeName="width" from="0" to="520" dur=".9s" begin=".2s" fill="freeze"/></rect></clipPath>
<clipPath id="cHi"><rect x="48" y="64" width="0" height="38"><animate attributeName="width" from="0" to="180" dur=".5s" begin="1.1s" fill="freeze"/></rect></clipPath>
<clipPath id="r1"><rect x="48" y="162" width="0" height="32"><animate attributeName="width" values="0;0;360;360;0;0" keyTimes="0;.01;.06;.22;.26;1" dur="20s" repeatCount="indefinite" begin="2.6s"/></rect></clipPath>
<clipPath id="r2"><rect x="48" y="162" width="0" height="32"><animate attributeName="width" values="0;0;360;360;0;0" keyTimes="0;.27;.32;.47;.51;1" dur="20s" repeatCount="indefinite" begin="2.6s"/></rect></clipPath>
<clipPath id="r3"><rect x="48" y="162" width="0" height="32"><animate attributeName="width" values="0;0;360;360;0;0" keyTimes="0;.52;.57;.72;.76;1" dur="20s" repeatCount="indefinite" begin="2.6s"/></rect></clipPath>
<clipPath id="r4"><rect x="48" y="162" width="0" height="32"><animate attributeName="width" values="0;0;360;360;0;0" keyTimes="0;.77;.82;.97;1;1" dur="20s" repeatCount="indefinite" begin="2.6s"/></rect></clipPath>
</defs>

<!-- BACKGROUND -->
<rect width="1280" height="400" rx="18" fill="url(#bg)"/>
<rect width="1280" height="400" rx="18" fill="url(#grid)"/>
<rect width="1280" height="400" rx="18" fill="url(#dots)"/>
