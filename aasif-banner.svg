<circle class="rp" cx="1100" cy="340" r="1" fill="#6E40C9" style="animation-duration:6s;animation-delay:2s"/>

<!-- Sparkles -->
<g class="tw" style="animation-delay:.5s"><path d="M440 50l2.2 5.8 5.8 2.2-5.8 2.2-2.2 5.8-2.2-5.8-5.8-2.2 5.8-2.2z" fill="#e879f9"/></g>
<g class="tw" style="animation-delay:1.8s"><path d="M820 60l2 5.4 5.4 2-5.4 2-2 5.4-2-5.4-5.4-2 5.4-2z" fill="#B14EE0"/></g>
<g class="tw" style="animation-delay:3.1s"><path d="M1180 130l2.2 5.8 5.8 2.2-5.8 2.2-2.2 5.8-2.2-5.8-5.8-2.2 5.8-2.2z" fill="#FF2D9B"/></g>
<g class="tw" style="animation-delay:2.4s"><path d="M680 320l1.8 4.8 4.8 1.8-4.8 1.8-1.8 4.8-1.8-4.8-4.8-1.8 4.8-1.8z" fill="#00D4FF"/></g>

