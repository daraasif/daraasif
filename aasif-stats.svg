<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 232" width="500" height="232" role="img" aria-label="Aasif Rashid Dar GitHub Stats">
<defs><style><![CDATA[
text{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace}
@keyframes fadeSlide{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes rankPulse{0%,100%{opacity:.8}50%{opacity:1}}
@keyframes shineX{0%{transform:translateX(-160px) skewX(-12deg)}65%,100%{transform:translateX(560px) skewX(-12deg)}}
.row{opacity:0;animation:fadeSlide .5s ease forwards}
.rk{animation:rankPulse 2.2s ease-in-out infinite}
.sh{animation:shineX 4.8s ease-in-out 2.2s infinite}
]]></style>
<linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%"><animate attributeName="stop-color" values="#B14EE0;#6E40C9;#B14EE0" dur="5s" repeatCount="indefinite"/></stop>
  <stop offset="100%"><animate attributeName="stop-color" values="#FF2D9B;#B14EE0;#FF2D9B" dur="5s" repeatCount="indefinite"/></stop>
</linearGradient>
<linearGradient id="ringg" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#B14EE0"/><stop offset="100%" stop-color="#6E40C9"/>
</linearGradient>
<linearGradient id="shg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fff" stop-opacity="0"/><stop offset="50%" stop-color="#fff" stop-opacity=".07"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/></linearGradient>
<clipPath id="cc"><rect x="1" y="1" width="498" height="230" rx="14"/></clipPath>
<filter id="g"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect x="1" y="1" width="498" height="230" rx="14" fill="#0D1117" stroke="url(#tg)" stroke-width="1.5"/>
<text x="24" y="38" font-size="15" font-weight="bold" fill="url(#tg)">Aasif Rashid Dar — GitHub Stats</text>

<g class="row" style="animation-delay:.45s">
  <text x="24" y="74" font-size="14">⭐</text>
  <text x="52" y="74" font-size="13" fill="#c9d1d9">Total Stars Earned:</text>
  <text x="316" y="74" text-anchor="end" font-size="14" font-weight="bold" fill="#fde047">25+</text>
</g>
<g class="row" style="animation-delay:.68s">
  <text x="24" y="105" font-size="14">💻</text>
  <text x="52" y="105" font-size="13" fill="#c9d1d9">Total Commits:</text>
  <text x="316" y="105" text-anchor="end" font-size="14" font-weight="bold" fill="#7dd3fc">500+</text>
</g>
<g class="row" style="animation-delay:.91s">
  <text x="24" y="136" font-size="14">📦</text>
  <text x="52" y="136" font-size="13" fill="#c9d1d9">Public Repos:</text>
  <text x="316" y="136" text-anchor="end" font-size="14" font-weight="bold" fill="#4ade80">15+</text>
</g>
<g class="row" style="animation-delay:1.14s">
  <text x="24" y="167" font-size="14">👥</text>
  <text x="52" y="167" font-size="13" fill="#c9d1d9">Followers:</text>
  <text x="316" y="167" text-anchor="end" font-size="14" font-weight="bold" fill="#c084fc">50+</text>
</g>
<g class="row" style="animation-delay:1.37s">
  <text x="24" y="198" font-size="14">🔥</text>
  <text x="52" y="198" font-size="13" fill="#c9d1d9">PRs &amp; Issues Opened:</text>
  <text x="316" y="198" text-anchor="end" font-size="14" font-weight="bold" fill="#FF2D9B">30+</text>
</g>

<!-- Rank ring -->
<g transform="translate(408,138)">
  <circle r="52" fill="none" stroke="#1c1230" stroke-width="9"/>
  <circle r="52" fill="none" stroke="url(#ringg)" stroke-width="9" stroke-linecap="round"
    stroke-dasharray="254.8 326.7" stroke-dashoffset="254.8" transform="rotate(-90)">
    <animate attributeName="stroke-dashoffset" from="254.8" to="0" dur="1.5s" begin=".5s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
  </circle>
  <text class="rk" y="14" text-anchor="middle" font-size="38" font-weight="bold" fill="#B14EE0" filter="url(#g)">A+</text>
  <text y="76" text-anchor="middle" font-size="10" fill="#6E40C9" opacity="0" style="animation:fadeSlide .5s ease 1.7s forwards">RANK</text>
</g>

<g clip-path="url(#cc)"><rect class="sh" x="0" y="0" width="110" height="232" fill="url(#shg)"/></g>
</svg>
