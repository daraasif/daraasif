<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 660" width="420" height="660" role="img" aria-label="Aasif Rashid Dar ID card lanyard">
<title>Aasif Rashid Dar — swinging ID badge</title>
<defs>
<style type="text/css"><![CDATA[
text{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace}
@keyframes settle{0%{transform:rotate(0deg) translateY(-660px)}18%{transform:rotate(0deg) translateY(0)}30%{transform:rotate(12deg)}46%{transform:rotate(-8deg)}62%{transform:rotate(5deg)}78%{transform:rotate(-3deg)}92%{transform:rotate(1.2deg)}100%{transform:rotate(0deg)}}
@keyframes sway{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
@keyframes cardWobble{0%,100%{transform:rotate(1.5deg)}50%{transform:rotate(-1.5deg)}}
@keyframes shine{0%{transform:translateX(-340px) skewX(-18deg)}55%,100%{transform:translateX(420px) skewX(-18deg)}}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.4)}50%{opacity:1;transform:scale(1)}}
@keyframes heartBeat{0%,100%{transform:scale(1)}12%{transform:scale(1.25)}24%{transform:scale(1)}36%{transform:scale(1.15)}48%{transform:scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes neonPulse{0%,100%{opacity:.6}50%{opacity:1}}
.settle{transform-origin:210px 6px;animation:settle 3.4s cubic-bezier(.34,1.1,.5,1) forwards}
.sway{transform-origin:210px 6px;animation:sway 4.2s ease-in-out 3.4s infinite}
.wob{transform-origin:210px 300px;animation:cardWobble 4.2s ease-in-out 3.4s infinite}
.shine{animation:shine 4.5s ease-in-out 3.6s infinite}
.tw{transform-box:fill-box;transform-origin:center;animation:twinkle 2.8s ease-in-out infinite}
.hb{transform-box:fill-box;transform-origin:center;animation:heartBeat 2.4s ease-in-out infinite}
.np{animation:neonPulse 2.5s ease-in-out infinite}
]]></style>
<linearGradient id="strapg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#6E40C9"/><stop offset="50%" stop-color="#B14EE0"/><stop offset="100%" stop-color="#6E40C9"/>
</linearGradient>
<linearGradient id="cardg" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#1A0F2E"/><stop offset="100%" stop-color="#0D0820"/>
</linearGradient>
<linearGradient id="cardborder" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%"><animate attributeName="stop-color" values="#B14EE0;#6E40C9;#FF2D9B;#B14EE0" dur="6s" repeatCount="indefinite"/></stop>
  <stop offset="100%"><animate attributeName="stop-color" values="#FF2D9B;#B14EE0;#6E40C9;#FF2D9B" dur="6s" repeatCount="indefinite"/></stop>
</linearGradient>
<linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#c8ccd6"/><stop offset="45%" stop-color="#8a90a0"/><stop offset="55%" stop-color="#6a7080"/><stop offset="100%" stop-color="#9aa0b0"/>
</linearGradient>
<linearGradient id="shineg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#fff" stop-opacity="0"/><stop offset="50%" stop-color="#fff" stop-opacity=".13"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/>
</linearGradient>
<linearGradient id="nameg2" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%"><animate attributeName="stop-color" values="#B14EE0;#6E40C9;#B14EE0" dur="5s" repeatCount="indefinite"/></stop>
  <stop offset="100%"><animate attributeName="stop-color" values="#FF2D9B;#B14EE0;#FF2D9B" dur="5s" repeatCount="indefinite"/></stop>
</linearGradient>
<radialGradient id="lglow"><stop offset="0%" stop-color="#B14EE0" stop-opacity=".16"/><stop offset="100%" stop-color="#B14EE0" stop-opacity="0"/></radialGradient>
<filter id="glow2"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity=".55"/></filter>
<clipPath id="cardclip"><rect x="82" y="298" width="256" height="330" rx="20"/></clipPath>
</defs>

<circle cx="210" cy="440" r="230" fill="url(#lglow)"><animate attributeName="r" values="230;252;230" dur="5s" repeatCount="indefinite"/></circle>

<g class="tw" style="animation-delay:.6s"><path d="M62 195l3 8 8 3-8 3-3 8-3-8-8-3 8-3z" fill="#B14EE0"/></g>
<g class="tw" style="animation-delay:1.8s"><path d="M370 295l2.4 6.4 6.4 2.4-6.4 2.4-2.4 6.4-2.4-6.4-6.4-2.4 6.4-2.4z" fill="#FF2D9B"/></g>
<g class="tw" style="animation-delay:2.9s"><path d="M50 480l2.4 6.4 6.4 2.4-6.4 2.4-2.4 6.4-2.4-6.4-6.4-2.4 6.4-2.4z" fill="#6E40C9"/></g>
<g class="hb" style="animation-delay:1.1s"><path d="M368 475 c-4-9-17-7-17 3 0 7 10 13 17 18 7-5 17-11 17-18 0-10-13-12-17-3z" fill="#FF2D9B" opacity=".8" filter="url(#glow2)"/></g>

<!-- pendulum: settle then sway -->
<g class="settle"><g class="sway">

  <!-- Strap -->
  <g>
    <path d="M191 -6 L229 -6 L226 236 L194 236 Z" fill="url(#strapg)"/>
    <line x1="196" y1="0" x2="198.5" y2="234" stroke="#fff" stroke-opacity=".5" stroke-width="1" stroke-dasharray="4 3"/>
    <line x1="224" y1="0" x2="221.5" y2="234" stroke="#fff" stroke-opacity=".5" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="0" y="0" font-size="10" font-weight="bold" fill="#fff" opacity=".88" letter-spacing="2" transform="translate(214,18) rotate(90)">AASIF.DEV ♦ CODE ♦ AASIF.DEV</text>
  </g>

  <!-- Clasp + ring -->
  <rect x="188" y="232" width="44" height="26" rx="6" fill="url(#metal)" stroke="#4a4f5c" stroke-width="1"/>
  <rect x="199" y="238" width="22" height="7" rx="3.5" fill="#3c414e"/>
  <circle cx="210" cy="272" r="14" fill="none" stroke="url(#metal)" stroke-width="5.5"/>

  <!-- Card (secondary wobble) -->
  <g class="wob">
    <rect x="82" y="298" width="256" height="330" rx="20" fill="url(#cardg)" stroke="url(#cardborder)" stroke-width="2" filter="url(#cardShadow)"/>
    <!-- slot -->
    <rect x="180" y="310" width="60" height="10" rx="5" fill="#080512" stroke="#3b2a5c" stroke-width="1"/>

    <g clip-path="url(#cardclip)">
      <!-- header band -->
      <rect x="82" y="298" width="256" height="34" fill="#1c0f3a" opacity=".75"/>
      <text x="98" y="320" font-size="9" fill="#8b949e" letter-spacing="1.5">DEVELOPER ID</text>
      <text x="322" y="320" text-anchor="end" font-size="9" fill="#B14EE0" letter-spacing="1.5">ARD-2024</text>
      <line x1="82" y1="332" x2="338" y2="332" stroke="#3b2a5c" stroke-width="1"/>

      <!-- avatar placeholder with initials -->
      <circle cx="210" cy="400" r="58" fill="#1c0f3a" stroke="url(#cardborder)" stroke-width="2.5"/>
      <text x="210" y="415" text-anchor="middle" font-size="42" font-weight="bold" fill="url(#nameg2)" filter="url(#glow2)">A</text>

      <!-- name as text (no font path needed) -->
      <text x="210" y="478" text-anchor="middle" font-size="18" font-weight="bold" fill="url(#nameg2)" filter="url(#glow2)">Aasif Rashid Dar</text>
      <text x="210" y="500" text-anchor="middle" font-size="10.5" fill="#B14EE0" font-weight="bold" letter-spacing="2">SOFTWARE ENGINEER</text>
      <text x="210" y="518" text-anchor="middle" font-size="10" fill="#8b949e">@daraasif</text>

      <line x1="100" y1="532" x2="320" y2="532" stroke="#2a1f3d" stroke-width="1"/>

      <!-- Company -->
      <text x="210" y="550" text-anchor="middle" font-size="11" fill="#e6edf3">Cogveel Technologies Pvt Ltd</text>
      <text x="210" y="568" text-anchor="middle" font-size="10" fill="#6E40C9">Kashmir, India</text>

      <!-- barcode -->
      <g transform="translate(100,580)">
        <rect x="0" y="0" width="2.5" height="24" fill="#e6edf3" opacity=".8"/>
        <rect x="5" y="0" width="1.5" height="24" fill="#e6edf3" opacity=".8"/>
        <rect x="9" y="0" width="1.5" height="24" fill="#e6edf3" opacity=".8"/>
        <rect x="13" y="0" width="4" height="24" fill="#e6edf3" opacity=".8"/>
        <rect x="19" y="0" width="1.5" height="24" fill="#e6edf3" opacity=".8"/>
        <rect x="23" y="0" width="4" height="24" fill="#e6edf3" opacity=".8"/>
        <rect x="29" y="0" width="1.5" height="24" fill="#e6edf3" opacity=".8"/>
        <rect x="33" y="0" width="2.5" height="24" fill="#e6edf3" opacity=".8"/>
        <rect x="38" y="0" width="1.5" height="24" fill="#e6edf3" opacity=".8"/>
        <rect x="42" y="0" width="4" height="24" fill="#e6edf3" opacity=".8"/>
        <rect x="48" y="0" width="1.5" height="24" fill="#e6edf3" opacity=".8"/>
        <rect x="52" y="0" width="2.5" height="24" fill="#e6edf3" opacity=".8"/>
        <rect x="57" y="0" width="1.5" height="24" fill="#e6edf3" opacity=".8"/>
        <rect x="61" y="0" width="4" height="24" fill="#e6edf3" opacity=".8"/>
        <rect x="67" y="0" width="1.5" height="24" fill="#e6edf3" opacity=".8"/>
        <rect x="71" y="0" width="2.5" height="24" fill="#e6edf3" opacity=".8"/>
        <rect x="76" y="0" width="1.5" height="24" fill="#e6edf3" opacity=".8"/>
        <rect x="80" y="0" width="4" height="24" fill="#e6edf3" opacity=".8"/>
        <rect x="87" y="0" width="1.5" height="24" fill="#e6edf3" opacity=".8"/>
        <rect x="91" y="0" width="4" height="24" fill="#e6edf3" opacity=".8"/>
      </g>
      <text x="320" y="594" text-anchor="end" font-size="8.5" fill="#8b949e">React • Python</text>
      <text x="320" y="606" text-anchor="end" font-size="8.5" fill="#8b949e">Django • JS</text>

      <!-- holo shine sweep -->
      <rect class="shine" x="82" y="288" width="120" height="360" fill="url(#shineg)"/>
    </g>
  </g>
</g></g>

<text x="210" y="648" text-anchor="middle" font-size="10" fill="#8b949e" opacity="0" style="animation:fadeIn .6s ease 3.6s forwards">— pure SVG, never breaks —</text>
</svg>
